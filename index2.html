<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    body {
      background-color: #ccc;
      margin: 10px 10px 10px 160px;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 150px;
      height: 100%;
      background-color: #000;
    }

    main {}

    main>div {
      margin-bottom: 10px;
    }

    .box1 {
      height: 200px;
      background-color: #fff;
    }

    .box2 {
      overflow: hidden;
    }

    .box2 div {
      float: left;
      width: calc(50% - 5px);
      height: 100px;
      background-color: #fff;
      margin-right: 10px;
    }

    .box2 div:last-child {
      margin-right: 0;
    }

    .box3 {
      height: 100px;
      background-color: #fff;
    }

    .box4 {
      height: 50px;
      background-color: #fff;
    }

    .box5 {
      overflow: hidden;
    }

    .box5 div {
      float: left;
      width: calc(80% - 5px);
      height: 100px;
      background-color: #fff;
      margin-right: 10px;
    }

    .box5 div:last-child {
      width: calc(20% - 5px);
      margin-right: 0;
    }

    .box6 {
      overflow: hidden;
    }

    .box6 div {
      float: left;
      width: calc(30% - 5px);
      height: 100px;
      background-color: #fff;
      margin-right: 10px;
    }

    .box6 div:last-child {
      width: calc(70% - 5px);
      margin-right: 0;
    }

    .box7 {
      height: 100px;
      background-color: #fff;
    }
  </style>
</head>

<body>
  <header></header>
  <main>
    <div class="box1"></div>
    <div class="box2">
      <div></div>
      <div></div>
    </div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5">
      <div></div>
      <div></div>
    </div>
    <div class="box6">
      <div></div>
      <div></div>
    </div>
    <div class="box7"></div>
  </main>
</body>

</html>
