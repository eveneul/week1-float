<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      font: inherit;
    }

    body {
      line-height: 1;
    }

    ul,
    ol {
      list-style: none;
    }

    a,
    a:visited {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      vertical-align: top;
    }

    .blind {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      clip: rect(0 0 0 0);
      overflow: hidden;
    }
  </style>
</head>

<body>

  <style>
    header {
      position: relative;
      height: 200px;
      background-color: #555;
    }

    header h1 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 50px;
      background-color: #fff;
    }

    header h1 a {
      display: block;
      height: 100%;
    }

    header .sns {
      position: absolute;
      top: 0;
      left: 0;
      width: 50px;
      height: 50px;
      background-color: #fff;
    }

    header .login {
      position: absolute;
      top: 0;
      right: 0;
      width: 50px;
      height: 50px;
      background-color: #fff;
    }
  </style>

  <header>
    <h1><a href="">로고</a></h1>
    <div class="sns">sns</div>
    <div class="login">login</div>
  </header>

  <style>
    .box1 {
      position: relative;
      width: 100%;
      height: 300px;
      background-color: #000;
    }

    .box1 .btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background-color: #fff;
    }

    .box1 .btn.prev {
      left: 10px;
    }

    .box1 .btn.next {
      right: 10px;
    }

    .box1 .pagination {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      overflow: hidden;
    }

    .box1 .pagination span {
      float: left;
      margin: 0 10px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: #fff;
      color: blue;
    }

    .box1 .pagination span.active {
      background-color: #f00;
    }
  </style>

  <main>
    <article class="box1">
      <h2 class="blind">공지사항</h2>
      <a href="" class="btn prev">prev</a>
      <a href="" class="btn next">next</a>
      <div class="pagination">
        <span class="active">1</span>
        <span>2</span>
        <span>3</span>
      </div>
    </article>

    <style>
      .box2 {
        padding: 100px 0;
      }

      .box2 h2 {
        text-align: center;
        font-size: 50px;
        font-weight: bold;
        margin-bottom: 50px;
      }

      .box2 ul {
        width: 800px;
        margin: 0 auto;
        overflow: hidden;
      }

      .box2 ul li {
        float: left;
        width: calc((100% - 20px) / 3);
        margin-right: 10px;
      }

      .box2 ul li:last-child {
        margin-right: 0;
      }

      .box2 ul li a {

        display: block;
        height: 100%;
        padding: 10px;
        background-color: #f00;
      }

      .box2 ul li img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        margin-bottom: 10px;
      }

      .box2 ul li p {
        padding: 10px;
        background-color: #fff;
      }
    </style>

    <article class="box2">
      <h2>이벤트</h2>
      <ul>
        <li>
          <a href="">
            <img src="https://m.doremicat.co.kr/web/upload/NNEditor/20210111/f077d1ed857f8746e232420044d4988f.jpg"
              alt="">
            <p>Lorem, ipsum dolor.</p>
          </a>
        </li>
        <li>
          <a href="">
            <img src="https://m.doremicat.co.kr/web/upload/NNEditor/20210111/f077d1ed857f8746e232420044d4988f.jpg"
              alt="">
            <p>Lorem, ipsum dolor.</p>
          </a>
        </li>
        <li>
          <a href="">
            <img src="https://m.doremicat.co.kr/web/upload/NNEditor/20210111/f077d1ed857f8746e232420044d4988f.jpg"
              alt="">
            <p>Lorem, ipsum dolor.</p>
          </a>
        </li>
      </ul>
    </article>

    <style>
      .box3 {
        padding: 100px 0;
      }

      .box3 ul {
        width: 800px;
        margin: 0 auto;

      }

      .box3 ul li {
        height: 100px;
        background-color: #333;
      }

      .box3 ul>*+* {
        margin-top: 10px;
      }
    </style>

    <article class="box3">
      <h2 class="blind">공지사항</h2>
      <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
      </ul>
    </article>
  </main>
</body>

</html>
