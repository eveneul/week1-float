<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    body {
      background-color: #ccc;
    }

    header {
      width: 100%;
      height: 100px;
      background-color: #000;
      margin-bottom: 10px;
    }

    main {
      width: 800px;
      margin: 0 auto;

    }

    main>article {
      margin-bottom: 10px;
    }

    .box1 {
      height: 200px;
      background-color: #fff;
    }

    .box2 {
      overflow: hidden;
    }

    .box2 div {
      float: left;
      width: calc((100% - 20px) / 3);
      height: 200px;
      background-color: #fff;
      margin-right: 10px;
    }

    .box2 div:last-child {
      margin-right: 0;
    }

    .box3 {
      overflow: hidden;
    }

    .box3 div {
      float: left;
      width: calc((100% - 40px) / 5);
      height: 200px;
      background-color: #fff;
      margin-right: 10px;
    }

    .box3 div:last-child {
      margin-right: 0;
    }

    .box4 {
      background-color: #fff;
      padding: 10px;
      overflow: hidden;
    }

    .box4 div {
      float: left;
      width: calc(50% - 5px);
      height: 200px;
      margin-right: 10px;
      background-color: #000;
    }

    .box4 div:last-child {
      margin-right: 0;
    }
  </style>
</head>

<body>
  <header></header>
  <main>
    <article class="box1"></article>
    <article class="box2">
      <div></div>
      <div></div>
      <div></div>
    </article>
    <article class="box3">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </article>
    <article class="box4">
      <div></div>
      <div></div>
    </article>
  </main>

</body>

</html>
